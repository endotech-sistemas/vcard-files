<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rodrigo Vaz | Endotech</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #121212;
            color: #E0E0E0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card-container {
            background: linear-gradient(135deg, #1e1e1e 0%, #141414 100%);
            border: 1px solid #2d2d2d;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            padding: 32px 24px;
            text-align: center;
        }
        .logo-container {
            margin-bottom: 24px;
        }
        .logo {
            max-width: 180px;
            height: auto;
        }
        .profile-container {
            position: relative;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }
        .profile-pic {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #f26522;
            box-shadow: 0 8px 16px rgba(242, 101, 34, 0.2);
        }
        .info-container {
            margin-bottom: 32px;
        }
        .name {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        .title {
            font-size: 14px;
            color: #a0a0a0;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }
        .company {
            font-size: 13px;
            color: #f26522;
            font-weight: 600;
        }
        .cta-btn {
            display: inline-block;
            width: 100%;
            background: #f26522;
            color: #ffffff;
            text-decoration: none;
            padding: 16px 24px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 6px 20px rgba(242, 101, 34, 0.3);
            transition: background 0.2s;
            margin-bottom: 20px;
        }
        .cta-btn:active {
            background: #d44d0e;
        }
        .secondary-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .link-item {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #222222;
            border: 1px solid #333333;
            color: #cccccc;
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
        }
        .link-item:active {
            background: #2a2a2a;
        }
        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: #555555;
            letter-spacing: 0.5px;
        }
    </style>
</head>
